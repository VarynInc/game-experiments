<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Minesweeper</title>
  <script src="main.js" charset="utf-8"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
.container {
  width: 500px;
  align-content: center;
}
.gameBoard {
  height: 400px;
  width: 400px;
  display: flex;
  flex-wrap: wrap;
  background-color: #dcd6bc;
  margin-left: 50px;
  margin-top: 20px;
  border: 10px solid #dcd6bc;
  margin-bottom: 10px;
}
div {
  font-size: 25px;
  text-align: center;
  font-family: 'Roboto Mono', monospace;
}
.empty {
  height: 40px;
  width: 40px;
  border: 5px solid;
  border-color: #f5f3eb #bab7a9 #bab7a9 #fff9db;
  box-sizing: border-box;
}
.checked {
  height: 40px;
  width: 40px;
  border: 2px solid;
  background-color: #cecab7;
  border-color: #9c998d;
  box-sizing: border-box;
}
.spy {
  height: 40px;
  width: 40px;
  border: 5px solid;
  border-color: #f5f3eb #bab7a9 #bab7a9 #fff9db;
  box-sizing: border-box;
}
.badGuess {
  background-color: #df1616;
}
.one {
  color: #1028ff;
}
.two {
  color: #127e1b;
}
.three {
  color: #e02a2a;
}
.four{
  color: #420e4d;
}
.five{
  color: #406e15;
}
.six{
  color: #29558f;
}
.seven{
  color: #751334;
}
.eight{
  color: #46450e;
}
.none{
  color: #868686;
}
#result {
  margin-top: 5px;
  color: #e76346;
}
  </style>
</head>
<body>
  <div class="container">
    <div class="gameBoard"></div>
    <div>Flags remaining: <span id="flags-left"></span></div>
    <div id="result"></div>
  </div>
</body>
</html>
